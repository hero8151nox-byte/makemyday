
<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語練習帳</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&family=ZCOOL+XiaoWei&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
--bg: #0d0d0f;
--surface: #16161a;
--surface2: #1e1e24;
--border: rgba(255,255,255,0.07);
--accent: #e8c56d;
--accent2: #7eb8d4;
--red: #e05c5c;
--green: #5cba8a;
--text: #e8e4da;
--muted: #6b6870;
--muted2: #9a9499;
}

- { margin:0; padding:0; box-sizing:border-box; }

body {
background: var(–bg);
min-height: 100vh;
font-family: ‘Noto Sans JP’, sans-serif;
color: var(–text);
display: flex;
flex-direction: column;
align-items: center;
}

/* ── SETUP SCREEN ── */
#setupScreen {
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 40px 20px;
width: 100%;
position: relative;
overflow: hidden;
}

.setup-bg {
position: absolute;
inset: 0;
overflow: hidden;
pointer-events: none;
}

.setup-bg span {
position: absolute;
font-family: ‘Shippori Mincho’, serif;
color: rgba(232,197,109,0.04);
font-size: 200px;
font-weight: 600;
user-select: none;
}

.setup-bg span:nth-child(1) { top:-30px; left:-30px; font-size:280px; }
.setup-bg span:nth-child(2) { bottom:-40px; right:-20px; font-size:240px; color:rgba(126,184,212,0.03); }
.setup-bg span:nth-child(3) { top:40%; left:50%; transform:translate(-50%,-50%); font-size:320px; opacity:0.5; }

.logo {
text-align: center;
margin-bottom: 48px;
position: relative;
z-index: 1;
}

.logo-line1 {
font-family: ‘Shippori Mincho’, serif;
font-size: 11px;
letter-spacing: 8px;
color: var(–accent);
text-transform: uppercase;
margin-bottom: 10px;
}

.logo-title {
font-family: ‘Shippori Mincho’, serif;
font-size: 42px;
font-weight: 600;
letter-spacing: 6px;
background: linear-gradient(135deg, var(–accent), #fff6dc, var(–accent2));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
line-height: 1.1;
}

.logo-sub {
font-size: 12px;
color: var(–muted);
letter-spacing: 3px;
margin-top: 8px;
}

.setup-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 36px 32px;
width: 100%;
max-width: 460px;
position: relative;
z-index: 1;
box-shadow: 0 40px 80px rgba(0,0,0,0.4);
}

.setup-section {
margin-bottom: 28px;
}

.setup-label {
font-size: 10px;
letter-spacing: 4px;
color: var(–accent);
text-transform: uppercase;
margin-bottom: 14px;
display: flex;
align-items: center;
gap: 8px;
}

.setup-label::after {
content: ‘’;
flex: 1;
height: 1px;
background: var(–border);
}

/* Level selector */
.level-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 10px;
}

.level-btn {
padding: 16px 10px;
border: 1px solid var(–border);
background: transparent;
border-radius: 8px;
cursor: pointer;
transition: all 0.2s;
text-align: center;
position: relative;
overflow: hidden;
}

.level-btn::before {
content: ‘’;
position: absolute;
inset: 0;
opacity: 0;
transition: opacity 0.2s;
}

.level-btn[data-level=“N5”]::before { background: linear-gradient(135deg, rgba(94,188,94,0.15), transparent); }
.level-btn[data-level=“N4”]::before { background: linear-gradient(135deg, rgba(126,184,212,0.15), transparent); }
.level-btn[data-level=“N3”]::before { background: linear-gradient(135deg, rgba(232,197,109,0.15), transparent); }

.level-btn.active { border-color: transparent; }
.level-btn.active::before { opacity: 1; }
.level-btn[data-level=“N5”].active { border-color: rgba(94,188,94,0.5); }
.level-btn[data-level=“N4”].active { border-color: rgba(126,184,212,0.5); }
.level-btn[data-level=“N3”].active { border-color: rgba(232,197,109,0.5); }

.level-name {
font-family: ‘Shippori Mincho’, serif;
font-size: 22px;
font-weight: 600;
margin-bottom: 4px;
}
.level-btn[data-level=“N5”] .level-name { color: #5ebc5e; }
.level-btn[data-level=“N4”] .level-name { color: var(–accent2); }
.level-btn[data-level=“N3”] .level-name { color: var(–accent); }

.level-desc {
font-size: 10px;
color: var(–muted);
letter-spacing: 1px;
}

.level-count {
font-size: 9px;
color: var(–muted);
margin-top: 3px;
}

/* Count selector */
.count-row {
display: flex;
align-items: center;
gap: 12px;
}

.count-slider {
flex: 1;
-webkit-appearance: none;
height: 3px;
background: var(–border);
border-radius: 3px;
outline: none;
cursor: pointer;
position: relative;
}

.count-slider::-webkit-slider-thumb {
-webkit-appearance: none;
width: 18px;
height: 18px;
border-radius: 50%;
background: var(–accent);
cursor: pointer;
box-shadow: 0 0 10px rgba(232,197,109,0.4);
transition: box-shadow 0.2s;
}

.count-slider::-webkit-slider-thumb:hover {
box-shadow: 0 0 20px rgba(232,197,109,0.6);
}

.count-display {
font-family: ‘Shippori Mincho’, serif;
font-size: 28px;
color: var(–accent);
min-width: 50px;
text-align: center;
line-height: 1;
}

.count-unit {
font-size: 11px;
color: var(–muted);
letter-spacing: 1px;
text-align: center;
margin-top: 2px;
}

.slider-marks {
display: flex;
justify-content: space-between;
padding: 0 2px;
margin-top: 6px;
}

.slider-mark {
font-size: 9px;
color: var(–muted);
letter-spacing: 1px;
}

/* Start button */
.start-btn {
width: 100%;
padding: 16px;
background: linear-gradient(135deg, rgba(232,197,109,0.2), rgba(232,197,109,0.1));
border: 1px solid rgba(232,197,109,0.4);
border-radius: 8px;
color: var(–accent);
font-family: ‘Shippori Mincho’, serif;
font-size: 16px;
letter-spacing: 6px;
cursor: pointer;
transition: all 0.3s;
margin-top: 8px;
position: relative;
overflow: hidden;
}

.start-btn::after {
content: ‘’;
position: absolute;
inset: 0;
background: rgba(232,197,109,0.08);
opacity: 0;
transition: opacity 0.2s;
}

.start-btn:hover::after { opacity: 1; }
.start-btn:hover { box-shadow: 0 0 30px rgba(232,197,109,0.2); }
.start-btn:active { transform: scale(0.98); }

/* ── QUIZ SCREEN ── */
#quizScreen {
display: none;
flex-direction: column;
align-items: center;
width: 100%;
min-height: 100vh;
padding: 24px 20px 40px;
}

/* Top bar */
.quiz-topbar {
width: 100%;
max-width: 520px;
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 20px;
}

.quiz-back {
background: none;
border: none;
color: var(–muted);
cursor: pointer;
font-size: 13px;
letter-spacing: 2px;
padding: 6px 0;
transition: color 0.2s;
font-family: ‘Noto Sans JP’, sans-serif;
}

.quiz-back:hover { color: var(–text); }

.quiz-info {
font-size: 11px;
color: var(–muted);
letter-spacing: 2px;
display: flex;
gap: 16px;
}

.quiz-level-badge {
font-family: ‘Shippori Mincho’, serif;
font-size: 13px;
padding: 3px 10px;
border-radius: 4px;
border: 1px solid;
}

/* Progress */
.progress-wrap {
width: 100%;
max-width: 520px;
margin-bottom: 28px;
}

.progress-track {
height: 3px;
background: var(–border);
border-radius: 3px;
overflow: hidden;
margin-bottom: 8px;
}

.progress-bar2 {
height: 100%;
background: linear-gradient(90deg, var(–accent2), var(–accent));
border-radius: 3px;
transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}

.progress-labels {
display: flex;
justify-content: space-between;
font-size: 10px;
color: var(–muted);
letter-spacing: 1px;
}

.score-pills {
display: flex;
gap: 8px;
}

.pill {
font-size: 10px;
padding: 2px 8px;
border-radius: 20px;
letter-spacing: 1px;
}

.pill-c { background: rgba(92,186,138,0.15); color: var(–green); border: 1px solid rgba(92,186,138,0.25); }
.pill-w { background: rgba(224,92,92,0.15); color: var(–red); border: 1px solid rgba(224,92,92,0.25); }

/* Question card */
.q-card {
width: 100%;
max-width: 520px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 32px 28px 28px;
margin-bottom: 16px;
position: relative;
box-shadow: 0 20px 60px rgba(0,0,0,0.3);
transition: border-color 0.3s;
}

.q-card.state-correct { border-color: rgba(92,186,138,0.5); }
.q-card.state-wrong { border-color: rgba(224,92,92,0.5); }

.q-num {
font-size: 10px;
color: var(–muted);
letter-spacing: 3px;
margin-bottom: 20px;
display: flex;
align-items: center;
gap: 8px;
}

.q-tag {
font-size: 10px;
padding: 2px 8px;
border-radius: 3px;
letter-spacing: 1px;
}

.q-tag-noun { background: rgba(126,184,212,0.1); color: var(–accent2); border: 1px solid rgba(126,184,212,0.2); }
.q-tag-verb { background: rgba(224,92,92,0.1); color: #e07a7a; border: 1px solid rgba(224,92,92,0.2); }
.q-tag-adj { background: rgba(92,186,138,0.1); color: var(–green); border: 1px solid rgba(92,186,138,0.2); }

.q-prompt-label {
font-size: 10px;
letter-spacing: 4px;
color: var(–muted);
text-transform: uppercase;
margin-bottom: 10px;
}

.q-meaning {
font-family: ‘ZCOOL XiaoWei’, serif;
font-size: 44px;
color: var(–text);
margin-bottom: 6px;
line-height: 1.1;
}

.q-hint {
font-size: 12px;
color: var(–muted);
margin-bottom: 24px;
min-height: 18px;
}

/* Input area */
.input-wrap {
position: relative;
}

.jp-input {
width: 100%;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 8px;
padding: 16px 50px 16px 18px;
font-family: ‘Noto Serif JP’, serif;
font-size: 22px;
color: var(–text);
outline: none;
transition: border-color 0.2s, box-shadow 0.2s;
letter-spacing: 3px;
ime-mode: active;
}

.jp-input:focus {
border-color: rgba(232,197,109,0.4);
box-shadow: 0 0 0 3px rgba(232,197,109,0.06);
}

.jp-input.correct-input {
border-color: rgba(92,186,138,0.5);
background: rgba(92,186,138,0.05);
}

.jp-input.wrong-input {
border-color: rgba(224,92,92,0.5);
background: rgba(224,92,92,0.05);
}

.submit-btn {
position: absolute;
right: 10px;
top: 50%;
transform: translateY(-50%);
background: rgba(232,197,109,0.15);
border: 1px solid rgba(232,197,109,0.3);
border-radius: 6px;
color: var(–accent);
width: 36px;
height: 36px;
cursor: pointer;
font-size: 16px;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.2s;
}

.submit-btn:hover { background: rgba(232,197,109,0.25); }

/* Answer feedback */
.answer-feedback {
margin-top: 14px;
border-radius: 8px;
padding: 14px 16px;
display: none;
animation: feedIn 0.3s ease;
}

@keyframes feedIn {
from { opacity:0; transform: translateY(-6px); }
to { opacity:1; transform: translateY(0); }
}

.answer-feedback.show { display: block; }
.answer-feedback.correct-fb { background: rgba(92,186,138,0.08); border: 1px solid rgba(92,186,138,0.2); }
.answer-feedback.wrong-fb { background: rgba(224,92,92,0.08); border: 1px solid rgba(224,92,92,0.2); }

.fb-row1 {
display: flex;
align-items: center;
gap: 8px;
margin-bottom: 6px;
}

.fb-icon { font-size: 18px; }
.fb-label { font-size: 13px; font-weight: 500; letter-spacing: 1px; }
.fb-correct .fb-label { color: var(–green); }
.fb-wrong .fb-label { color: var(–red); }

.fb-correct-ans {
font-family: ‘Noto Serif JP’, serif;
font-size: 20px;
letter-spacing: 3px;
color: var(–text);
margin-bottom: 4px;
}

.fb-reading {
font-size: 13px;
color: var(–accent);
letter-spacing: 2px;
}

.fb-sentence {
margin-top: 10px;
padding-top: 10px;
border-top: 1px solid rgba(255,255,255,0.06);
font-family: ‘Noto Serif JP’, serif;
font-size: 13px;
color: var(–muted2);
line-height: 2;
}

.fb-sentence-zh {
font-size: 11px;
color: var(–muted);
margin-top: 2px;
}

/* Buttons */
.action-row {
width: 100%;
max-width: 520px;
display: flex;
gap: 10px;
}

.btn-skip2 {
flex: 0 0 auto;
padding: 13px 20px;
background: transparent;
border: 1px solid var(–border);
border-radius: 8px;
color: var(–muted);
font-family: ‘Noto Sans JP’, sans-serif;
font-size: 12px;
letter-spacing: 2px;
cursor: pointer;
transition: all 0.2s;
}

.btn-skip2:hover { border-color: rgba(255,255,255,0.15); color: var(–text); }

.btn-next {
flex: 1;
padding: 13px;
background: linear-gradient(135deg, rgba(232,197,109,0.2), rgba(126,184,212,0.1));
border: 1px solid rgba(232,197,109,0.35);
border-radius: 8px;
color: var(–accent);
font-family: ‘Shippori Mincho’, serif;
font-size: 14px;
letter-spacing: 4px;
cursor: pointer;
transition: all 0.2s;
display: none;
}

.btn-next.show { display: block; }
.btn-next:hover { box-shadow: 0 0 20px rgba(232,197,109,0.15); }

/* ── RESULT SCREEN ── */
#resultScreen {
display: none;
flex-direction: column;
align-items: center;
width: 100%;
min-height: 100vh;
padding: 40px 20px;
justify-content: center;
}

.result-header {
text-align: center;
margin-bottom: 36px;
}

.result-kanji {
font-family: ‘Shippori Mincho’, serif;
font-size: 72px;
margin-bottom: 12px;
display: block;
}

.result-title {
font-family: ‘Shippori Mincho’, serif;
font-size: 24px;
letter-spacing: 6px;
color: var(–text);
margin-bottom: 6px;
}

.result-sub {
font-size: 11px;
color: var(–muted);
letter-spacing: 3px;
}

.result-score-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 28px 32px;
width: 100%;
max-width: 420px;
margin-bottom: 24px;
}

.score-row {
display: flex;
gap: 0;
margin-bottom: 20px;
}

.score-box {
flex: 1;
text-align: center;
padding: 16px 10px;
border-radius: 8px;
}

.score-box:first-child { margin-right: 8px; background: rgba(92,186,138,0.08); border: 1px solid rgba(92,186,138,0.2); }
.score-box:last-child { background: rgba(224,92,92,0.08); border: 1px solid rgba(224,92,92,0.2); }

.score-big2 {
font-family: ‘Shippori Mincho’, serif;
font-size: 48px;
line-height: 1;
margin-bottom: 4px;
}

.score-box:first-child .score-big2 { color: var(–green); }
.score-box:last-child .score-big2 { color: var(–red); }

.score-lbl2 {
font-size: 10px;
color: var(–muted);
letter-spacing: 2px;
}

.accuracy-bar-wrap {
margin-bottom: 8px;
}

.acc-label {
display: flex;
justify-content: space-between;
font-size: 10px;
color: var(–muted);
letter-spacing: 2px;
margin-bottom: 6px;
}

.acc-pct { color: var(–accent); font-family: ‘Shippori Mincho’, serif; font-size: 14px; }

.acc-bar-track {
height: 4px;
background: var(–border);
border-radius: 4px;
overflow: hidden;
}

.acc-bar-fill {
height: 100%;
border-radius: 4px;
background: linear-gradient(90deg, var(–green), var(–accent));
transition: width 1s cubic-bezier(0.4,0,0.2,1);
}

/* Wrong answers review */
.wrong-list {
width: 100%;
max-width: 420px;
margin-bottom: 24px;
}

.wrong-list-title {
font-size: 10px;
letter-spacing: 4px;
color: var(–accent);
text-transform: uppercase;
margin-bottom: 12px;
display: flex;
align-items: center;
gap: 8px;
}

.wrong-list-title::after {
content: ‘’;
flex: 1;
height: 1px;
background: var(–border);
}

.wrong-item {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 8px;
padding: 12px 14px;
margin-bottom: 8px;
display: flex;
align-items: center;
gap: 12px;
}

.wi-meaning {
font-family: ‘ZCOOL XiaoWei’, serif;
font-size: 18px;
color: var(–muted2);
min-width: 60px;
}

.wi-arrow { color: var(–muted); font-size: 12px; }

.wi-jp {
font-family: ‘Noto Serif JP’, serif;
font-size: 20px;
color: var(–text);
letter-spacing: 2px;
margin-right: 6px;
}

.wi-reading {
font-size: 11px;
color: var(–accent);
letter-spacing: 1px;
}

.wi-your {
margin-left: auto;
font-size: 11px;
color: var(–red);
font-family: ‘Noto Serif JP’, serif;
letter-spacing: 1px;
opacity: 0.7;
}

.result-btns {
display: flex;
gap: 10px;
width: 100%;
max-width: 420px;
}

.btn-retry {
flex: 1;
padding: 14px;
background: linear-gradient(135deg, rgba(232,197,109,0.15), rgba(126,184,212,0.08));
border: 1px solid rgba(232,197,109,0.35);
border-radius: 8px;
color: var(–accent);
font-family: ‘Shippori Mincho’, serif;
font-size: 14px;
letter-spacing: 4px;
cursor: pointer;
transition: all 0.2s;
}

.btn-retry:hover { box-shadow: 0 0 20px rgba(232,197,109,0.15); }

.btn-home {
padding: 14px 20px;
background: transparent;
border: 1px solid var(–border);
border-radius: 8px;
color: var(–muted);
font-family: ‘Noto Sans JP’, sans-serif;
font-size: 12px;
letter-spacing: 2px;
cursor: pointer;
transition: all 0.2s;
}

.btn-home:hover { border-color: rgba(255,255,255,0.15); color: var(–text); }

/* Utility */
@keyframes slideUp {
from { opacity:0; transform:translateY(24px); }
to { opacity:1; transform:translateY(0); }
}

.slide-up { animation: slideUp 0.4s ease forwards; }
</style>

</head>

</div>
</div>

<!-- ══ QUIZ SCREEN ══ -->

<div id="quizScreen">
<div class="quiz-topbar">
<button class="quiz-back" onclick="goHome()">← 返回</button>
<div class="quiz-info">
<span id="levelBadge" class="quiz-level-badge">N5</span>

{ jp:'評価', alt:['ひょうか'], reading:'ひょうか', meaning:'评价', type:'名詞', sentence:'公正な評価をお願いします。', sentenceZh:'请给予公正的评价。' },
]
};

// ════ STATE ════
let selectedLevel = 'N5';
let quizCount = 20;
let quizWords = [];
let qi = 0;
let correctCount = 0;
let wrongCount = 0;
let wrongWords = [];
let answered = false;

// ════ SETUP ════
function updateCounts() {
['N5','N4','N3'].forEach(l => {
document.getElementById('cnt-'+l).textContent = WORDS[l].length + ' 词';
});
}

function selectLevel(l) {
selectedLevel = l;
document.querySelectorAll('.level-btn').forEach(b => b.classList.toggle('active', b.dataset.level === l));
// Constrain count
const max = Math.min(50, WORDS[l].length);
const slider = document.getElementById('countSlider');
slider.max = max;
if (parseInt(slider.value) > max) slider.value = max;
updateCount();
}

function updateCount() {
const v = document.getElementById('countSlider').value;
document.getElementById('countDisplay').textContent = v;
quizCount = parseInt(v);
}

function startQuiz() {
quizCount = parseInt(document.getElementById('countSlider').value);
const pool = [...WORDS[selectedLevel]];
shuffle(pool);
quizWords = pool.slice(0, Math.min(quizCount, pool.length));
qi = 0; correctCount = 0; wrongCount = 0; wrongWords = [];

document.getElementById('setupScreen').style.display = 'none';
document.getElementById('resultScreen').style.display = 'none';
document.getElementById('quizScreen').style.display = 'flex';

// Set level badge style
const badge = document.getElementById('levelBadge');
badge.textContent = selectedLevel;
const colors = { N5: '#5ebc5e', N4: '#7eb8d4', N3: '#e8c56d' };
badge.style.color = colors[selectedLevel];
badge.style.borderColor = colors[selectedLevel];

showQuestion();
}

// ════ QUIZ ════
function showQuestion() {
if (qi >= quizWords.length) { showResult(); return; }

answered = false;
const w = quizWords[qi];
const card = document.getElementById('qCard');
card.className = 'q-card';

document.getElementById('qCounter').textContent = String(qi+1).padStart(2,'0');
document.getElementById('qMeaning').textContent = w.meaning;
document.getElementById('qHint').textContent = `提示：${w.type} · ${selectedLevel}`;

// Type tag
const tag = document.getElementById('qTag');
tag.textContent = w.type;
tag.className = 'q-tag ' + (w.type==='名詞'?'q-tag-noun': w.type==='動詞'?'q-tag-verb':'q-tag-adj');

// Reset input
const inp = document.getElementById('jpInput');
inp.value = '';
inp.className = 'jp-input';
inp.disabled = false;

// Hide feedback
const fb = document.getElementById('feedback');
fb.className = 'answer-feedback';
document.getElementById('btnNext').className = 'btn-next';

// Progress
const pct = (qi / quizWords.length) * 100;
document.getElementById('progressBar2').style.width = pct + '%';
document.getElementById('qNumLabel').textContent = `第 ${qi+1} 题 / 共 ${quizWords.length} 题`;
document.getElementById('pillC').textContent = `✓ ${correctCount}`;
document.getElementById('pillW').textContent = `✗ ${wrongCount}`;

setTimeout(() => inp.focus(), 100);
}

function handleKey(e) {
if (e.key === 'Enter') {
if (answered) nextQuestion();
else submitAnswer();
}
}

function submitAnswer() {
if (answered) return;
const inp = document.getElementById('jpInput');
const raw = inp.value.trim();
if (!raw) return;

answered = true;
inp.disabled = true;

const w = quizWords[qi];
const accepted = [w.jp, ...w.alt].map(s => s.trim());
const isCorrect = accepted.includes(raw);

const card = document.getElementById('qCard');
const fb = document.getElementById('feedback');
const icon = document.getElementById('fbIcon');
const label = document.getElementById('fbLabel');
const correctAns = document.getElementById('fbCorrectAns');
const reading = document.getElementById('fbReading');
const sentence = document.getElementById('fbSentence');
const sentenceZh = document.getElementById('fbSentenceZh');

if (isCorrect) {
correctCount++;
inp.className = 'jp-input correct-input';
card.className = 'q-card state-correct';
fb.className = 'answer-feedback correct-fb fb-correct show';
icon.textContent = '✓';
label.textContent = '正确！';
correctAns.textContent = w.jp;
reading.textContent = w.reading;
} else {
wrongCount++;
wrongWords.push({ word: w, userAns: raw });
inp.className = 'jp-input wrong-input';
card.className = 'q-card state-wrong';
fb.className = 'answer-feedback wrong-fb fb-wrong show';
icon.textContent = '✗';
label.textContent = `答错了，正确答案是：`;
correctAns.textContent = w.jp;
reading.textContent = w.reading;
}
sentence.textContent = w.sentence;
sentenceZh.textContent = w.sentenceZh;

document.getElementById('btnNext').className = 'btn-next show';
document.getElementById('pillC').textContent = `✓ ${correctCount}`;
document.getElementById('pillW').textContent = `✗ ${wrongCount}`;
}

function skipQuestion() {
if (answered) { nextQuestion(); return; }
answered = true;
const w = quizWords[qi];
wrongCount++;
wrongWords.push({ word: w, userAns: '（跳过）' });

const inp = document.getElementById('jpInput');
inp.className = 'jp-input wrong-input';
inp.disabled = true;
document.getElementById('qCard').className = 'q-card state-wrong';

const fb = document.getElementById('feedback');
fb.className = 'answer-feedback wrong-fb fb-wrong show';
document.getElementById('fbIcon').textContent = '→';
document.getElementById('fbLabel').textContent = '跳过，正确答案是：';
document.getElementById('fbCorrectAns').textContent = w.jp;
document.getElementById('fbReading').textContent = w.reading;
document.getElementById('fbSentence').textContent = w.sentence;
document.getElementById('fbSentenceZh').textContent = w.sentenceZh;
document.getElementById('btnNext').className = 'btn-next show';
document.getElementById('pillW').textContent = `✗ ${wrongCount}`;
}

function nextQuestion() {
qi++;
showQuestion();
}

// ════ RESULT ════
function showResult() {
document.getElementById('quizScreen').style.display = 'none';
const rs = document.getElementById('resultScreen');
rs.style.display = 'flex';

const total = quizWords.length;
const acc = total > 0 ? Math.round(correctCount / total * 100) : 0;

// Emoji based on accuracy
const emoji = acc >= 90 ? '優' : acc >= 70 ? '良' : acc >= 50 ? '可' : '頑';
document.getElementById('resultKanji').textContent = emoji;

document.getElementById('finalC').textContent = correctCount;
document.getElementById('finalW').textContent = wrongCount;
document.getElementById('accPct').textContent = acc + '%';
setTimeout(() => {
document.getElementById('accBarFill').style.width = acc + '%';
}, 100);

// Wrong list
const wl = document.getElementById('wrongList');
wl.innerHTML = '';
if (wrongWords.length > 0) {
const title = document.createElement('div');
title.className = 'wrong-list-title';
title.textContent = '答错的单词';
wl.appendChild(title);
wrongWords.forEach(({ word: w, userAns }) => {
const item = document.createElement('div');
item.className = 'wrong-item';
item.innerHTML = `
<span class="wi-meaning">${w.meaning}</span>
<span class="wi-arrow">›</span>
<span class="wi-jp">${w.jp}</span>
<span class="wi-reading">${w.reading}</span>
<span class="wi-your">${userAns}</span>
`;
wl.appendChild(item);
});
}

const btn = document.getElementById('btnRetry');
btn.style.display = wrongWords.length > 0 ? '' : 'none';
}

function retryWrong() {
quizWords = wrongWords.map(w => w.word);
shuffle(quizWords);
qi = 0; correctCount = 0; wrongCount = 0; wrongWords = [];
document.getElementById('resultScreen').style.display = 'none';
document.getElementById('quizScreen').style.display = 'flex';
showQuestion();
}

function goHome() {
document.getElementById('quizScreen').style.display = 'none';
document.getElementById('resultScreen').style.display = 'none';
document.getElementById('setupScreen').style.display = 'flex';
}

function shuffle(arr) {
for (let i = arr.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i+1));
[arr[i], arr[j]] = [arr[j], arr[i]];
}
}

// Init
updateCounts();
// set slider max
const initMax = Math.min(50, WORDS['N5'].length);
document.getElementById('countSlider').max = initMax;
document.getElementById('countSlider').value = 20;
updateCount();
</script>
